<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="description" content="Tableau de bord pour la curation et le résumé hebdomadaire de l'actualité IA sur X." />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Solopilot" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>Solopilot</title>
    <script>
      (function () {
        var t = localStorage.getItem("theme") || "system";
        if (t === "dark") document.documentElement.classList.add("dark");
        else if (t === "system" && window.matchMedia("(prefers-color-scheme: dark)").matches)
          document.documentElement.classList.add("dark");
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#18181d" media="(prefers-color-scheme: dark)" />
    <meta name="description" content="Solopilot — le back-office autonome de l'entreprise individuelle : veille, acquisition, CRM, facturation et agenda dans un briefing quotidien." />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Solopilot" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>Solopilot</title>
    <script>
      (function () {
        var t = localStorage.getItem("theme") || "system";
        if (t === "dark") document.documentElement.classList.add("dark");
        else if (t === "system" && window.matchMedia("(prefers-color-scheme: dark)").matches)
          document.documentElement.classList.add("dark");
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
